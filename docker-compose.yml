services:
  mysql:
    image: mysql:8.4
    container_name: deadlock_demo_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: deadlock_demo
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --innodb-deadlock-detect=ON --innodb-lock-wait-timeout=10
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:18beta1
    container_name: deadlock_demo_postgres
    environment:
      POSTGRES_DB: deadlock_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "25432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d deadlock_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  postgres_data:
